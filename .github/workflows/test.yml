name: CI

permissions: {}

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  contracts:
    name: Contracts (forge build)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Forge version
        run: forge --version

      - name: Build contracts
        run: forge build --sizes

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build (vite + nitro)
        # The build step compiles TypeScript via Vite/Rollup which is the
        # source of truth for "is this app shippable". A standalone `tsc`
        # step would also flag pre-existing typing mismatches in third
        # party SDK adapters (Circle App Kit) that don't actually break
        # the build, so we keep CI focused on the bundler outcome.
        run: npm run build
